services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite:///./data/trendscope.db
      FRONTEND_ORIGIN: http://localhost:8000
      PROVIDER_MODE: mock
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

volumes:
  backend-data:
